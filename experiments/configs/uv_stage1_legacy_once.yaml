project:
  name: faithc-uv-stage1-legacy-once
  run_prefix: uv-s1-legacy

paths:
  runs_dir: experiments/runs

data:
  samples:
    - name: corgi_traveller
      high_mesh: assets/examples/corgi_traveller.glb
    - name: aksfbx
      high_mesh: assets/aksfbx.glb
    - name: rotarycannon
      high_mesh: assets/rotarycannonfbx.glb

pipeline:
  device: cuda

  reconstruction:
    enabled: true
    resolution: 8
    margin: 0.05
    tri_mode: auto
    compute_flux: true
    clamp_anchors: true
    save_tokens: true
    retry_on_empty_mesh: true
    retry_resolutions: [16, 32, 64, 128]
    min_level: -1
    solver_weights:
      lambda_n: 1.0
      lambda_d: 0.001
      weight_power: 1

  uv:
    enabled: true
    method: hybrid_global_opt
    sample:
      base_per_face: 4
      min_per_face: 3
      max_per_face: 12
      seed: 12345
    seam:
      strategy: halfedge_island
      uv_span_threshold: 0.35
      min_valid_samples_per_face: 2
      exclude_cross_seam_faces: true
      local_vertex_split: true
      high_position_eps: 1.0e-06
      high_uv_eps: 1.0e-05
      uv_island_guard_enabled: true
      uv_island_guard_mode: soft
      uv_island_guard_confidence_min: 0.55
      uv_island_guard_allow_unknown: false
      uv_island_guard_fallback: nearest_same_island_then_udf
    iterative:
      enabled: false
    solve:
      backend: auto
      lambda_smooth: 0.001
      pcg_max_iter: 2000
      pcg_tol: 1.0e-06
      pcg_check_every: 25
      pcg_preconditioner: jacobi
      anchor_weight: 0.1
      ridge_eps: 1.0e-08
    texture_weight:
      enabled: true
      grad_weight_gamma: 1.0
      max_weight: 5.0

  eval:
    enabled: true
    sample_points: 10000

  render:
    enabled: false
    backend: mitsuba3
    preset: default
    variant: cuda_ad_rgb
    samples_per_pixel: 64
    preset_path: ""
